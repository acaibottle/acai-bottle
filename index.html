<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Açaí Bottle</title>
<link rel="icon" href="favicon.ico">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

/* LAYOUT */
.container{
    display:flex;
}

/* PRODUTOS */
.lado-produtos{
    width:70%;
}

header{
    background:linear-gradient(90deg,#5e2b97,#7b3fe4);
    color:white;
    text-align:center;
    padding:20px;
}

.logo{
    width:120px;
}

.produtos{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:20px;
    padding:20px;
}

.produto{
    background:white;
    padding:15px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.produto img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
}

.descricao{
    font-size:14px;
}

.tamanho, .acompanhamentos{
    font-size:14px;
    margin-top:10px;
}

button{
    background:#25D366;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
    cursor:pointer;
}

/* CARRINHO */
.lado-carrinho{
    width:30%;
    position:sticky;
    top:0;
    height:100vh;
    overflow:auto;
    padding:15px;
}

.carrinho{
    background:white;
    padding:15px;
    border-radius:12px;
}

#lista-carrinho li{
    display:flex;
    justify-content:space-between;
    margin-bottom:5px;
}

.btn-remover{
    background:red;
    color:white;
    border:none;
    border-radius:50%;
    width:20px;
    height:20px;
    cursor:pointer;
}

.total{
    text-align:right;
    font-weight:bold;
}

/* POPUP */
.modal-frete{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-conteudo{
background:white;
padding:20px;
border-radius:10px;
}

.fechar{
cursor:pointer;
position:absolute;
top:10px;
right:15px;
}

/* CONFIRMAÇÃO */
#confirmacao{
position:fixed;
bottom:20px;
right:20px;
background:#4CAF50;
color:white;
padding:10px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div id="confirmacao">✔ Item adicionado</div>

<div class="container">

<!-- PRODUTOS -->
<div class="lado-produtos">

<header>
<img src="logo.png" class="logo">
<h1>Açaí Bottle</h1>
</header>

<section class="produtos">

<!-- TRADICIONAL -->
<div class="produto">
<img src="https://via.placeholder.com/220x150">
<h3>Tradicional</h3>

<div class="tamanho">
<label><input type="radio" name="trad" data-preco="12">300ml</label>
<label><input type="radio" name="trad" data-preco="18">500ml</label>
</div>

<div class="acompanhamentos">
<label><input type="checkbox" data-extra="1" value="Leite condensado">Leite condensado</label>
<label><input type="checkbox" data-extra="1" value="Amendoim">Amendoim</label>
</div>

<button onclick="add(this,'Tradicional')">Adicionar</button>
</div>

<!-- NINHO -->
<div class="produto">
<img src="img/ninho.jpg">
<h3>Ninho</h3>

<div class="tamanho">
<label><input type="radio" name="ninho" data-preco="14">300ml</label>
<label><input type="radio" name="ninho" data-preco="21">500ml</label>
</div>

<button onclick="add(this,'Ninho')">Adicionar</button>
</div>

<!-- MEU AÇAÍ -->
<div class="produto">
<img src="img/meu-acai.jpg">
<h3>Meu Açaí</h3>

<div class="tamanho">
<label><input type="radio" name="meu" data-preco="14">300ml</label>
<label><input type="radio" name="meu" data-preco="21">500ml</label>
</div>

<button onclick="abrirMeuAcai()">Escolher acompanhamentos</button>
<button onclick="addMeuAcai(this)">Adicionar</button>
</div>

</section>

</div>

<!-- CARRINHO -->
<div class="lado-carrinho">

<div class="carrinho">
<h3>🛒 Carrinho</h3>

<ul id="lista-carrinho"></ul>

<p>Frete: R$ <span id="frete">0</span></p>

<div class="total">
Total: R$ <span id="total">0</span>
</div>

<select id="bairro" onchange="freteChange(this)">
<option value="">Bairro</option>
<option value="3">Japãozinho</option>
<option value="5">Centro</option>
<option value="7">Jardins</option>
</select>

<input id="nomeCliente" placeholder="Nome">
<input id="enderecoCliente" placeholder="Endereço">

<select id="pagamento">
<option value="">Pagamento</option>
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<button onclick="enviar()">Enviar WhatsApp</button>

</div>

</div>

</div>

<!-- POPUP -->
<div id="modalMeuAcai" class="modal-frete">
<div class="modal-conteudo">
<span onclick="fecharMeuAcai()" class="fechar">X</span>

<label><input type="checkbox" value="Paçoca">Paçoca</label>
<label><input type="checkbox" value="Leite condensado">Leite condensado</label>

</div>
</div>

<script>

let carrinho=[];
let total=0;
let frete=0;

function add(btn,nome){
let prod=btn.closest(".produto");
let radio=prod.querySelector("input[type=radio]:checked");

if(!radio){alert("Escolha tamanho");return;}

let preco=Number(radio.dataset.preco);

let extras=[];
prod.querySelectorAll("input[type=checkbox]:checked").forEach(e=>{
preco+=Number(e.dataset.extra||0);
extras.push(e.value);
});

carrinho.push({nome:nome,preco,detalhes:extras.join(",")});
total+=preco;

render();
msg();
}

function addMeuAcai(btn){
let prod=btn.closest(".produto");
let radio=prod.querySelector("input[type=radio]:checked");

if(!radio){alert("Escolha tamanho");return;}

let preco=Number(radio.dataset.preco);

let extras=[];
document.querySelectorAll("#modalMeuAcai input:checked").forEach(e=>{
extras.push(e.value);
});

carrinho.push({nome:"Meu Açaí",preco,detalhes:extras.join(",")});
total+=preco;

render();
msg();
fecharMeuAcai();
}

function render(){
let ul=document.getElementById("lista-carrinho");
ul.innerHTML="";

carrinho.forEach((i,index)=>{
ul.innerHTML+=`
<li>${i.nome} - ${i.preco}
<button onclick="rem(${index})">x</button></li>`;
});

document.getElementById("total").innerText=(total+frete).toFixed(2);
}

function rem(i){
total-=carrinho[i].preco;
carrinho.splice(i,1);
render();
}

function freteChange(e){
frete=Number(e.value);
render();
}

function abrirMeuAcai(){
document.getElementById("modalMeuAcai").style.display="flex";
}

function fecharMeuAcai(){
document.getElementById("modalMeuAcai").style.display="none";
}

function msg(){
let c=document.getElementById("confirmacao");
c.style.display="block";
setTimeout(()=>c.style.display="none",1500);
}

function enviar(){
let msg="Pedido:\n";
carrinho.forEach(i=>{
msg+=`${i.nome} - ${i.preco}\n`;
});
window.open("https://wa.me/5579996090459?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
