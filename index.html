<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Açaí Bottle</title>
<link rel="icon" href="favicon.ico">
</head>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
display:flex;
}

/* LAYOUT */
.container{
display:flex;
width:100%;
}

.lado-produtos{
width:70%;
padding:20px;
}

.carrinho{
width:30%;
background:#fff;
padding:15px;
position:fixed;
right:0;
top:0;
height:100%;
overflow:auto;
box-shadow:-3px 0 10px rgba(0,0,0,0.1);
}

/* PRODUTOS */
.produtos{
display:flex;
flex-wrap:wrap;
gap:20px;
}

.produto{
background:#fff;
padding:15px;
width:220px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.produto img{
width:100%;
border-radius:10px;
}

/* BOTÕES */
button{
background:#25D366;
color:#fff;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
margin-top:8px;
width:100%;
}

.btn-remover{
width:22px;
height:22px;
border-radius:50%;
background:red;
color:#fff;
}

/* CONFIRMAÇÃO */
#confirmacao{
position:fixed;
bottom:20px;
right:20px;
background:#4CAF50;
color:#fff;
padding:10px;
border-radius:6px;
display:none;
}

/* MODAL */
.modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:10px;
max-width:300px;
}

</style>

<body>

<div id="confirmacao">✔ Item adicionado</div>

<div class="container">

<div class="lado-produtos">

<h2>🍧 Cardápio</h2>

<div class="produtos">

<!-- TRADICIONAL -->
<div class="produto">
<img src="https://via.placeholder.com/220">
<h3>Tradicional</h3>

<label><input type="radio" name="trad" data-preco="12">300ml R$12</label>
<label><input type="radio" name="trad" data-preco="18">500ml R$18</label>

<label><input type="checkbox" data-extra="1" value="Leite condensado"> +Leite condensado</label>
<label><input type="checkbox" data-extra="1" value="Amendoim"> +Amendoim</label>

<button onclick="add(this,'Tradicional')">Adicionar</button>
</div>

<!-- NINHO -->
<div class="produto">
<img src="img/ninho.jpg">
<h3>Ninho</h3>

<label><input type="radio" name="ninho" data-preco="14">300ml R$14</label>
<label><input type="radio" name="ninho" data-preco="21">500ml R$21</label>

<button onclick="add(this,'Ninho')">Adicionar</button>
</div>

<!-- MARACUJA -->
<div class="produto">
<img src="img/maracuja.jpg">
<h3>Maracujá</h3>

<label><input type="radio" name="mara" data-preco="14">300ml R$14</label>
<label><input type="radio" name="mara" data-preco="21">500ml R$21</label>

<button onclick="add(this,'Maracujá')">Adicionar</button>
</div>

<!-- NUTELLA -->
<div class="produto">
<img src="img/nutella.jpg">
<h3>Nutella</h3>

<label><input type="radio" name="nut" data-preco="16.5">300ml R$16,50</label>
<label><input type="radio" name="nut" data-preco="26">500ml R$26</label>

<button onclick="add(this,'Nutella')">Adicionar</button>
</div>

<!-- MEU AÇAÍ -->
<div class="produto">
<img src="img/meu-acai.jpg">
<h3>Meu Açaí</h3>

<label><input type="radio" name="meu" data-preco="14">300ml R$14</label>
<label><input type="radio" name="meu" data-preco="21">500ml R$21</label>

<button onclick="abrirModal()">Escolher acompanhamentos</button>
<button onclick="addMeu(this)">Adicionar</button>
</div>

</div>
</div>

<!-- CARRINHO -->
<div class="carrinho">

<h3>🛒 Carrinho</h3>
<ul id="lista"></ul>

<p>Frete: R$ <span id="frete">0</span></p>
<p><b>Total: R$ <span id="total">0</span></b></p>

<select id="bairro" onchange="freteCalc()">
<option value="">Bairro</option>
<option value="3" data-nome="Cidade Nova">Cidade Nova</option>
<option value="5" data-nome="Centro">Centro</option>
<option value="7" data-nome="Jardins">Jardins</option>
</select>

<input id="nome" placeholder="Seu nome">
<input id="endereco" placeholder="Endereço">

<select id="pagamento">
<option>Pagamento</option>
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<button onclick="enviar()">Enviar WhatsApp</button>

</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">

<h4>Escolha até 2</h4>

<label><input type="checkbox" value="Paçoca"> Paçoca</label>
<label><input type="checkbox" value="Leite em pó"> Leite em pó</label>
<label><input type="checkbox" value="Nutella" data-extra="1.5"> Nutella +1,50</label>

<button onclick="fecharModal()">Fechar</button>

</div>
</div>

<script>

let carrinho=[]
let total=0
let frete=0
let bairro=""

function add(btn,nome){

let box=btn.parentElement
let radio=box.querySelector("input[type=radio]:checked")

if(!radio){alert("Escolha tamanho");return}

let preco=Number(radio.dataset.preco)
let extras=[]
let checks=box.querySelectorAll("input[type=checkbox]:checked")

checks.forEach(c=>{
preco+=Number(c.dataset.extra||0)
extras.push(c.value)
})

carrinho.push({nome,preco,extras})
total+=preco

render()
confirmar()
}

function addMeu(btn){

let box=btn.parentElement
let radio=box.querySelector("input[type=radio]:checked")
let checks=document.querySelectorAll("#modal input:checked")

if(!radio){alert("Escolha tamanho");return}
if(checks.length==0){alert("Escolha acompanhamento");return}

let preco=Number(radio.dataset.preco)
let extras=[]

checks.forEach(c=>{
preco+=Number(c.dataset.extra||0)
extras.push(c.value)
})

carrinho.push({nome:"Meu Açaí",preco,extras})
total+=preco

render()
confirmar()
}

function render(){
let lista=document.getElementById("lista")
lista.innerHTML=""

carrinho.forEach((i,idx)=>{
let li=document.createElement("li")
li.innerHTML=i.nome+" - "+i.preco.toFixed(2)

let b=document.createElement("button")
b.innerText="x"
b.className="btn-remover"
b.onclick=()=>remover(idx)

li.appendChild(b)
lista.appendChild(li)
})

document.getElementById("total").innerText=(total+frete).toFixed(2)
}

function remover(i){
total-=carrinho[i].preco
carrinho.splice(i,1)
render()
}

function confirmar(){
let c=document.getElementById("confirmacao")
c.style.display="block"
setTimeout(()=>c.style.display="none",1500)
}

function freteCalc(){
let s=document.getElementById("bairro")
frete=Number(s.value)
bairro=s.options[s.selectedIndex].dataset.nome

document.getElementById("frete").innerText=frete
render()
}

function enviar(){

let nome=document.getElementById("nome").value
let end=document.getElementById("endereco").value
let pag=document.getElementById("pagamento").value

let msg="Pedido Açaí Bottle\n\n"

carrinho.forEach(i=>{
msg+=i.nome+" - "+i.preco+"\n"
})

msg+="\nFrete: "+frete
msg+="\nTotal: "+(total+frete)
msg+="\nCliente: "+nome
msg+="\nEndereço: "+end
msg+="\nBairro: "+bairro
msg+="\nPagamento: "+pag

window.open("https://wa.me/5579996090459?text="+encodeURIComponent(msg))
}

function abrirModal(){
document.getElementById("modal").style.display="flex"
}
function fecharModal(){
document.getElementById("modal").style.display="none"
}

</script>

</body>
</html>
